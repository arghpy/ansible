---
- name: Pre-installation phase
  block:
    - name: Prepare installation disk
      include_tasks: 01_prepare_disk.yml

    - name: Install packages
      include_tasks: 020_install_packages.yml

    - name: Other settings
      include_tasks: 025_other_settings.yml

    - name: Run in chroot
      include_tasks: 03_run_chroot.yml

    - name: Enable services
      include_tasks: 04_enable_services.yml

    - name: Reboot and wait for the system
      reboot:

  rescue:
    - name: Unmounting everything on /mnt
      shell: umount -R /mnt

    - name: Turning swap off
      shell: swapoff {{ disk }}2
